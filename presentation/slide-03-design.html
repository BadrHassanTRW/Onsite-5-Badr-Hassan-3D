<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 3 - Design</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }
        .slide {
            padding: 60px;
            max-width: 1000px;
        }
        h2 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 60px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }
        p {
            font-size: 28px;
            line-height: 1.8;
            color: #333;
            font-weight: 300;
        }
        .nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 16px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>Design Approach</h2>
        <p>
            Clean and minimalist interface using Bootstrap for responsive layouts. 
            Mobile-first design ensures the site works perfectly on all devices. 
            Simple navigation with intuitive user experience focused on ease of shopping.
        </p>
    </div>
    <div class="nav">3 / 10</div>
</body>
</html>
