<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 6 - Architecture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }
        .slide {
            padding: 60px;
            max-width: 1000px;
        }
        h2 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 60px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }
        .architecture {
            display: flex;
            flex-direction: column;
            gap: 40px;
            font-size: 24px;
        }
        .layer {
            padding: 30px;
            background: #f8f8f8;
            text-align: center;
            border: 1px solid #e0e0e0;
        }
        .layer-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .arrow {
            text-align: center;
            font-size: 32px;
            color: #999;
        }
        .nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 16px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>System Architecture</h2>
        <div class="architecture">
            <div class="layer">
                <div class="layer-title">Frontend</div>
                React.js + Bootstrap
            </div>
            <div class="arrow">↓</div>
            <div class="layer">
                <div class="layer-title">Backend</div>
                PHP REST API
            </div>
            <div class="arrow">↓</div>
            <div class="layer">
                <div class="layer-title">Database</div>
                MySQL
            </div>
        </div>
    </div>
    <div class="nav">6 / 10</div>
</body>
</html>
