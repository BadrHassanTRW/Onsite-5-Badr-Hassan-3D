<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 5 - Key Features</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }
        .slide {
            padding: 60px;
            max-width: 1000px;
        }
        h2 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 60px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }
        .features {
            display: grid;
            gap: 30px;
            font-size: 24px;
            color: #333;
        }
        .feature {
            padding: 25px 25px 25px 60px;
            position: relative;
        }
        .feature:before {
            content: "—";
            position: absolute;
            left: 25px;
            color: #1a1a1a;
        }
        .nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 16px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>Key Features</h2>
        <div class="features">
            <div class="feature">Product browsing with search and category filters</div>
            <div class="feature">Shopping cart with persistent storage</div>
            <div class="feature">Complete checkout process with order management</div>
            <div class="feature">Responsive design for all devices</div>
            <div class="feature">Real-time cart updates and notifications</div>
        </div>
    </div>
    <div class="nav">5 / 10</div>
</body>
</html>
