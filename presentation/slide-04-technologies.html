<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 4 - Technologies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }
        .slide {
            padding: 60px;
            max-width: 1000px;
        }
        h2 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 60px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }
        .tech-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            font-size: 24px;
            color: #333;
        }
        .tech-item {
            padding: 30px;
            background: #f8f8f8;
            border-left: 3px solid #1a1a1a;
        }
        .tech-label {
            font-weight: 600;
            margin-bottom: 10px;
        }
        .nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 16px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>Technologies Used</h2>
        <div class="tech-list">
            <div class="tech-item">
                <div class="tech-label">Frontend</div>
                React.js + Bootstrap
            </div>
            <div class="tech-item">
                <div class="tech-label">Backend</div>
                PHP REST API
            </div>
            <div class="tech-item">
                <div class="tech-label">Database</div>
                MySQL
            </div>
            <div class="tech-item">
                <div class="tech-label">Version Control</div>
                Git + GitHub
            </div>
        </div>
    </div>
    <div class="nav">4 / 10</div>
</body>
</html>
