<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 9 - Links</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }
        .slide {
            padding: 60px;
            max-width: 1000px;
        }
        h2 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 60px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .link-item {
            padding: 30px;
            background: #f8f8f8;
            border-left: 3px solid #1a1a1a;
        }
        .link-label {
            font-size: 20px;
            color: #999;
            margin-bottom: 10px;
        }
        .link-url {
            font-size: 24px;
            color: #1a1a1a;
            word-break: break-all;
        }
        .nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 16px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>Project Links</h2>
        <div class="links">
            <div class="link-item">
                <div class="link-label">GitHub Repository</div>
                <div class="link-url">github.com/BadrHassanTRW/Onsite-5-Badr-Hassan-3D</div>
            </div>
            <div class="link-item">
                <div class="link-label">Documentation</div>
                <div class="link-url">README.md in repository</div>
            </div>
            <div class="link-item">
                <div class="link-label">Local Demo</div>
                <div class="link-url">localhost:5173 (with XAMPP running)</div>
            </div>
        </div>
    </div>
    <div class="nav">9 / 10</div>
</body>
</html>
